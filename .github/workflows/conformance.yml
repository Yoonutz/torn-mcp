name: Conformance

# Weekly live conformance: call every Torn endpoint with the test key and
# validate each response against its OpenAPI schema. Without the
# TORN_TEST_API_KEY secret the harness runs in compile-check mode (no calls).
# Non-gating for PRs; a real schema mismatch fails this run and notifies.

on:
  schedule:
    - cron: "0 7 * * 3" # Wednesdays 07:00 UTC
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Snapshot the current drift as the accepted baseline and commit it (manual refresh)"
        type: boolean
        default: false

# Least privilege: the default token only reads. The baseline-refresh push
# authenticates with GH_PAT (persisted by checkout), not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Needed only by the baseline-refresh path to push to main (ruleset
          # bypassed via the admin PAT); harmless for the read-only check run.
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Scheduled run, or manual run without the refresh box ticked: read-only
      # check. Fails the run on new drift; uploads the report.
      - name: Run conformance
        if: ${{ inputs.update_baseline != true }}
        env:
          TORN_TEST_API_KEY: ${{ secrets.TORN_TEST_API_KEY }}
        run: node scripts/conformance.mjs
      - name: Upload report
        if: ${{ always() && inputs.update_baseline != true }}
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report
          path: |
            conformance-report.md
            conformance.json

      # Manual refresh: re-snapshot Torn's standing drift into the baseline, show
      # exactly what moved in the run summary, then commit only if it changed.
      - name: Refresh baseline
        if: ${{ inputs.update_baseline == true }}
        env:
          TORN_TEST_API_KEY: ${{ secrets.TORN_TEST_API_KEY }}
        run: |
          # Live run snapshots the baseline AND writes auto-derived overrides;
          # then bake those overrides into the committed catalog.
          node scripts/conformance.mjs --update-baseline
          node scripts/generate-endpoints.mjs
          FILES="conformance-baseline.json scripts/lib/returns-overrides.generated.json src/generated/endpoints.ts"
          if [ -z "$(git status --porcelain $FILES)" ]; then
            echo "Baseline and overrides unchanged — nothing to commit." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "### Conformance refresh"
            echo "Review the accepted drift and auto-derived shapes below before trusting the next run:"
            echo '```diff'
            git --no-pager diff $FILES
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          git config user.name "torn-mcp-conformance"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $FILES
          git commit -m "Refresh conformance baseline and auto-derived overrides"
          git push
