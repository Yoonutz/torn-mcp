name: Sync OpenAPI

# Weekly check for Torn OpenAPI spec changes. Regenerates the endpoint catalog,
# gates on typecheck + tests, and commits straight to main only if everything
# passes (main's ruleset is bypassed via the admin-owned GH_PAT). A failing run
# (e.g. a spec change that breaks the build) commits nothing and notifies you.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

# Least privilege: the default token only reads. The sync commit/push
# authenticates with GH_PAT (persisted by checkout), not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync-openapi
      - run: npm run typecheck
      - run: npm test
      - name: Commit regenerated files if the spec changed
        run: |
          # .sync-msg.txt is gitignored; its presence means sync detected changes.
          if [ -z "$(git status --porcelain openapi.json src/generated docs/generated)" ]; then
            echo "Torn spec unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "torn-mcp-sync"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json src/generated docs/generated
          git commit -F .sync-msg.txt
          git push
